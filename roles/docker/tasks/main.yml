---
- name: Install required packages
  apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: yes

- name: Create directory for apt keyrings
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker official GPG key
  get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: yes

- name: Add Docker repository
  copy:
    dest: /etc/apt/sources.list.d/docker.sources
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/debian
      Suites: {{ ansible_facts['distribution_release'] }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Ensure Docker service is started and enabled
  service:
    name: docker
    state: started
    enabled: yes

- name: Add admin user to docker group
  user:
    name: "{{ admin_username }}"
    groups: docker
    append: yes

- name: Create directory for Docker stacks
  file:
    path: /opt/stacks
    state: directory
    owner: "{{ admin_username }}"
    group: docker
    mode: '0775'

- name: Create base directory for containers
  file:
    path: /opt/containers
    state: directory
    owner: "{{ admin_username }}"
    group: docker
    mode: '0775'

- name: Create shared docker network
  docker_network:
    name: proxy-nw
    state: present
